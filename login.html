<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Sharp AI</title>
    <meta name="description" content="Sign in or create your Sharp AI account." />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="platform.css" />
    <style>
        /* ── Auth page layout ── */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--nav-h) + 40px) 20px 60px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow);
            animation: slideUp 0.45s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Logo ── */
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .auth-logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 13px;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 24px rgba(250, 204, 21, 0.3);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
        }

        .auth-logo-text {
            font-family: var(--font-title);
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
        }

        .auth-logo-accent {
            color: var(--purple-l);
        }

        /* ── Tab switcher ── */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-2);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            transition: all .25s;
        }

        .auth-tab.active {
            background: var(--grad);
            color: #fff;
            box-shadow: 0 4px 16px rgba(250, 204, 21, 0.2);
        }

        /* ── Heading ── */
        .auth-heading {
            font-family: var(--font-title);
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            text-align: center;
        }

        .auth-sub {
            font-size: 14px;
            color: var(--text-2);
            text-align: center;
            margin-bottom: 28px;
        }

        /* ── Form ── */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .auth-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            letter-spacing: .03em;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }

        .auth-input::placeholder {
            color: var(--text-2);
            opacity: .6;
        }

        .auth-input:focus {
            border-color: var(--purple);
            background: rgba(250, 204, 21, 0.05);
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.1);
        }

        /* ── Error / Success alerts ── */
        .auth-alert {
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .auth-alert.show {
            display: flex;
        }

        .auth-alert.error {
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #fca5a5;
        }

        .auth-alert.success {
            background: rgba(16, 185, 129, .12);
            border: 1px solid rgba(16, 185, 129, .3);
            color: #6ee7b7;
        }

        /* ── Submit button ── */
        .auth-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--grad);
            color: #fff;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(250, 204, 21, 0.25);
            transition: transform .25s, box-shadow .25s, opacity .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(250, 204, 21, 0.4);
        }

        .auth-submit:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner inside button */
        .btn-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .65s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Divider ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-2);
            font-size: 12px;
            margin: 4px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Footer link ── */
        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-2);
            margin-top: 8px;
        }

        .auth-footer a,
        .auth-footer span {
            color: var(--purple-l);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover,
        .auth-footer span:hover {
            text-decoration: underline;
        }

        /* ── Password strength bar ── */
        .pw-strength {
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .pw-strength-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .3s, background .3s;
        }

        /* ── Panel switch animation ── */
        .auth-panel {
            animation: fadeIn .3s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── Subtle top accent line ── */
        .auth-card::before {
            content: '';
            display: block;
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--grad);
            border-radius: 0 0 4px 4px;
        }

        .auth-card {
            position: relative;
        }

        /* ── Social Login ── */
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all .2s;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-2);
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        /* ── Method Toggles ── */
        .method-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .method-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-2);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .method-btn.active {
            background: var(--purple);
            color: #fff;
            border-color: var(--purple);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* ── Phone Auth Update ── */
        .phone-input-wrap {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 110px;
            /* Slightly wider for emoji + code */
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .country-code option {
            background: var(--bg-card);
            color: var(--text);
        }

        #recaptcha-container {
            margin: 10px 0;
            display: flex;
            justify-content: center;
        }

        .otp-group {
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn .3s ease both;
        }

        .otp-group.show {
            display: flex;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 22px;
            }
        }
    </style>
</head>

<body>
    <canvas id="space-canvas"></canvas>
    <div id="platformNav"></div>

    <div class="auth-page">
        <div class="auth-card">

            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <polygon
                            points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
                            fill="url(#authGrad)" stroke="none" />
                        <defs>
                            <linearGradient id="authGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="auth-logo-text">Sharp<span class="auth-logo-accent"> AI</span></span>
            </div>

            <!-- Tab switcher -->
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tabLogin" role="tab">Sign In</button>
                <button class="auth-tab" id="tabRegister" role="tab">Create Account</button>
            </div>

            <!-- ── SIGN IN PANEL ── -->
            <div id="panelLogin" class="auth-panel">
                <h1 class="auth-heading">Welcome back</h1>
                <p class="auth-sub">Sign in to your Sharp AI account</p>

                <div class="social-login">
                    <button class="google-btn" id="googleLoginBtn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                            class="google-icon" alt="Google">
                        Sign in with Google
                    </button>
                    <div class="auth-divider"><span>or use</span></div>
                </div>

                <div class="method-toggle">
                    <button class="method-btn active" onclick="switchMethod('login', 'email')">Email</button>
                    <button class="method-btn" onclick="switchMethod('login', 'phone')">Phone No.</button>
                </div>

                <div class="auth-alert" id="loginAlert"></div>

                <!-- Email Login Form -->
                <form class="auth-form" id="loginForm">
                    <div class="auth-field">
                        <label class="auth-label" for="loginEmail">Email</label>
                        <input class="auth-input" id="loginEmail" type="email" placeholder="you@example.com"
                            autocomplete="email" required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="loginPassword">Password</label>
                        <input class="auth-input" id="loginPassword" type="password" placeholder="••••••••"
                            autocomplete="current-password" required />
                    </div>
                    <button class="auth-submit" id="loginBtn" type="submit">
                        <div class="btn-spinner" id="loginSpinner"></div>
                        <span id="loginBtnText">Sign In →</span>
                    </button>
                </form>

                <!-- Phone Login Form (Hidden by default) -->
                <form class="auth-form" id="phoneLoginForm" style="display:none">
                    <div class="auth-field">
                        <label class="auth-label">Phone Number</label>
                        <div class="phone-input-wrap">
                            <select class="country-code" id="loginCountryCode">
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                                <option value="+91" selected>🇮🇳 +91</option>
                                <option value="+971">🇦🇪 +971</option>
                                <option value="+61">🇦🇺 +61</option>
                                <option value="+65">🇸🇬 +65</option>
                                <option value="+1">🇨🇦 +1</option>
                                <option value="+49">🇩🇪 +49</option>
                                <option value="+33">🇫🇷 +33</option>
                                <option value="+81">🇯🇵 +81</option>
                                <option value="+39">🇮🇹 +39</option>
                                <option value="+7">🇷🇺 +7</option>
                                <option value="+55">🇧🇷 +55</option>
                                <option value="+27">🇿🇦 +27</option>
                                <option value="+62">🇮🇩 +62</option>
                                <option value="+60">🇲🇾 +60</option>
                                <option value="+82">🇰🇷 +82</option>
                                <option value="+52">🇲🇽 +52</option>
                                <option value="+34">🇪🇸 +34</option>
                                <option value="+90">🇹🇷 +90</option>
                                <option value="+966">🇸🇦 +966</option>
                                <option value="+20">🇪🇬 +20</option>

                            <input class="auth-input" id="loginPhoneNumber" type="tel" placeholder="1234567890" />

                    </div>
                    <div id="login-recaptcha-container"></div>
                    <div class="otp-group" id="loginOtpGroup">
                        <div class="auth-field">
                            <label class="auth-label">Verification Code</label>
                            <input class="auth-input" id="loginOtpCode" type="text" placeholder="6-digit code"

                    </div>
                    <button class="auth-submit" id="loginPhoneSubmitBtn" type="submit">
                        <div class="btn-spinner" id="loginPhoneSpinner"></div>
                        <span id="loginPhoneBtnText">Send Code →</span>

                </form>

                <div class="auth-footer" style="margin-top:20px">
                    No account? <span onclick="switchTab('register')">Create one free →</span>
                </div>
            </div>

            <!-- ── CREATE ACCOUNT PANEL ── -->
            <div id="panelRegister" class="auth-panel" style="display:none">
                <h1 class="auth-heading">Create account</h1>
                <p class="auth-sub">Build AI bots. Earn $Sharp. Free to start.</p>

                <div class="social-login">
                    <button class="google-btn" id="googleRegisterBtn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                            class="google-icon" alt="Google">
                        Sign up with Google
                    </button>
                    <div class="auth-divider"><span>or use</span></div>
                </div>

                <div class="method-toggle">
                    <button class="method-btn active" onclick="switchMethod('reg', 'email')">Email</button>
                    <button class="method-btn" onclick="switchMethod('reg', 'phone')">Phone No.</button>
                </div>

                <div class="auth-alert" id="registerAlert"></div>

                <!-- Email Register Form -->
                <form class="auth-form" id="registerForm">
                    <div class="auth-field">
                        <label class="auth-label" for="regName">Full Name</label>
                        <input class="auth-input" id="regName" type="text" placeholder="Your name" autocomplete="name"
                            required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="regEmail">Email</label>
                        <input class="auth-input" id="regEmail" type="email" placeholder="you@example.com"
                            autocomplete="email" required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="regPassword">Password</label>
                        <input class="auth-input" id="regPassword" type="password" placeholder="Min 6 characters"
                            autocomplete="new-password" required />
                        <div class="pw-strength">
                            <div class="pw-strength-fill" id="pwFill" style="width:0%"></div>
                        </div>
                    </div>
                    <button class="auth-submit" id="registerBtn" type="submit">
                        <div class="btn-spinner" id="registerSpinner"></div>
                        <span id="registerBtnText">Create Account →</span>
                    </button>
                </form>

                <!-- Phone Register Form (Hidden by default) -->
                <form class="auth-form" id="phoneRegisterForm" style="display:none">
                    <div class="auth-field">
                        <label class="auth-label">Full Name</label>
                        <input class="auth-input" id="regPhoneName" type="text" placeholder="Your name" />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label">Phone Number</label>
                        <div class="phone-input-wrap">
                            <select class="country-code" id="regCountryCode">
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                                <option value="+91" selected>🇮🇳 +91</option>
                                <option value="+971">🇦🇪 +971</option>
                                <option value="+61">🇦🇺 +61</option>
                                <option value="+65">🇸🇬 +65</option>
                                <option value="+1">🇨🇦 +1</option>
                                <option value="+49">🇩🇪 +49</option>
                                <option value="+33">🇫🇷 +33</option>
                                <option value="+81">🇯🇵 +81</option>
                                <option value="+39">🇮🇹 +39</option>
                                <option value="+7">🇷🇺 +7</option>
                                <option value="+55">🇧🇷 +55</option>
                                <option value="+27">🇿🇦 +27</option>
                                <option value="+62">🇮🇩 +62</option>
                                <option value="+60">🇲🇾 +60</option>
                                <option value="+82">🇰🇷 +82</option>
                                <option value="+52">🇲🇽 +52</option>
                                <option value="+34">🇪🇸 +34</option>
                                <option value="+90">🇹🇷 +90</option>
                                <option value="+966">🇸🇦 +966</option>
                                <option value="+20">🇪🇬 +20</option>
                            </select>
                            <input class="auth-input" id="regPhoneNumber" type="tel" placeholder="1234567890" />
                        </div>
                    </div>
                    <div id="reg-recaptcha-container"></div>
                    <div class="otp-group" id="regOtpGroup">
                        <div class="auth-field">
                            <label class="auth-label">Verification Code</label>
                            <input class="auth-input" id="regOtpCode" type="text" placeholder="6-digit code"
                                maxlength="6" />
                        </div>
                    </div>
                    <button class="auth-submit" id="registerPhoneSubmitBtn" type="submit">
                        <div class="btn-spinner" id="registerPhoneSpinner"></div>
                        <span id="registerPhoneBtnText">Send Code →</span>
                    </button>
                </form>

                <div class="auth-footer" style="margin-top:20px">
                    Already have an account? <span onclick="switchTab('login')">Sign in →</span>
                </div>
            </div>

        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script type="module" src="platform.js"></script>
    <script src="animation.js"></script>
    <script type="module">
        import { auth, db } from './firebase.js';
        import {
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            updateProfile,
            onAuthStateChanged,
            GoogleAuthProvider,
            signInWithPopup,
            RecaptchaVerifier,
            signInWithPhoneNumber
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ── Auth Guard: If already logged in, go to dashboard ──
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // ── Auth Guard: If already logged in, go to dashboard ──
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // ── Tab & Method Switching ──
        window.switchTab = (tab) => {
            const isLogin = tab === 'login';
            document.getElementById('tabLogin').classList.toggle('active', isLogin);
            document.getElementById('tabRegister').classList.toggle('active', !isLogin);
            document.getElementById('panelLogin').style.display = isLogin ? '' : 'none';
            document.getElementById('panelRegister').style.display = !isLogin ? '' : 'none';
        };

        window.switchMethod = (panel, method) => {
            const isEmail = method === 'email';
            if (panel === 'login') {
                document.getElementById('loginForm').style.display = isEmail ? '' : 'none';
                document.getElementById('phoneLoginForm').style.display = isEmail ? 'none' : '';
                document.querySelectorAll('#panelLogin .method-btn')[0].classList.toggle('active', isEmail);
                document.querySelectorAll('#panelLogin .method-btn')[1].classList.toggle('active', !isEmail);
            } else {
                document.getElementById('registerForm').style.display = isEmail ? '' : 'none';
                document.getElementById('phoneRegisterForm').style.display = isEmail ? 'none' : '';
                document.querySelectorAll('#panelRegister .method-btn')[0].classList.toggle('active', isEmail);
                document.querySelectorAll('#panelRegister .method-btn')[1].classList.toggle('active', !isEmail);
            }
        };

        // ── Helpers ──
        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = (type === 'error' ? '⚠ ' : '✓ ') + msg;
            el.className = `auth-alert ${type} show`;
        }
        function clearAlert(id) {
            const el = document.getElementById(id);
            if (el) el.className = 'auth-alert';
        }
        function setLoading(btnId, spinnerId, textId, loading, label) {
            const btn = document.getElementById(btnId);
            const spinner = document.getElementById(spinnerId);
            const text = document.getElementById(textId);
            if (btn) btn.disabled = loading;
            if (spinner) spinner.style.display = loading ? 'block' : 'none';
            if (text) text.textContent = loading ? 'Processing...' : label;
        }

        // ── Email Auth ──
        async function handleEmailLogin(e) {
            e.preventDefault();
            clearAlert('loginAlert');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            setLoading('loginBtn', 'loginSpinner', 'loginBtnText', true, 'Sign In →');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                showAlert('loginAlert', err.message.replace('Firebase: ', ''), 'error');
                setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false, 'Sign In →');
            }
        }
        document.getElementById('loginForm').addEventListener('submit', handleEmailLogin);

        async function handleEmailRegister(e) {
            e.preventDefault();
            clearAlert('registerAlert');
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            setLoading('registerBtn', 'registerSpinner', 'registerBtnText', true, 'Create Account →');
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                await UserStore.sync(cred.user);
                showToast('Welcome to Sharp AI! 🚀', 'success', '🎉');
            } catch (err) {
                showAlert('registerAlert', err.message.replace('Firebase: ', ''), 'error');
                setLoading('registerBtn', 'registerSpinner', 'registerBtnText', false, 'Create Account →');
            }
        }
        document.getElementById('registerForm').addEventListener('submit', handleEmailRegister);

        // ── Google Auth ──
        async function handleGoogleAuth() {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                await UserStore.sync(result.user);
                showToast('Welcome to Sharp AI! 🚀', 'success', '🎉');
            } catch (err) {
                showToast(err.message.replace('Firebase: ', ''), 'error', '⚠️');
            }
        }
        document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleAuth);
        document.getElementById('googleRegisterBtn').addEventListener('click', handleGoogleAuth);

        // ── Phone Auth Logic ──
        let loginConfirmation = null;
        let regConfirmation = null;

        function initRecaptcha(type) {
            const containerId = type === 'login' ? 'login-recaptcha-container' : 'reg-recaptcha-container';
            const verifierKey = type === 'login' ? 'loginVerifier' : 'regVerifier';
            if (window[verifierKey]) return;
            window[verifierKey] = new RecaptchaVerifier(auth, containerId, { 'size': 'invisible' });
        }

        async function handlePhoneAuth(type, e) {
            e.preventDefault();
            const isLogin = type === 'login';
            const alertId = isLogin ? 'loginAlert' : 'registerAlert';
            const btnId = isLogin ? 'loginPhoneSubmitBtn' : 'registerPhoneSubmitBtn';
            const spinnerId = isLogin ? 'loginPhoneSpinner' : 'registerPhoneSpinner';
            const textId = isLogin ? 'loginPhoneBtnText' : 'registerPhoneBtnText';
            const phoneVal = document.getElementById(isLogin ? 'loginPhoneNumber' : 'regPhoneNumber').value.trim();
            const countryVal = document.getElementById(isLogin ? 'loginCountryCode' : 'regCountryCode').value;
            const fullPhone = countryVal + phoneVal;
            const confirmation = isLogin ? loginConfirmation : regConfirmation;
            const otpGroup = document.getElementById(isLogin ? 'loginOtpGroup' : 'regOtpGroup');
            const otpCode = document.getElementById(isLogin ? 'loginOtpCode' : 'regOtpCode').value.trim();

            clearAlert(alertId);

            // Step 1: Send Code
            if (!confirmation) {
                if (!phoneVal) return showAlert(alertId, 'Enter phone number', 'error');
                setLoading(btnId, spinnerId, textId, true, 'Sending...');
                initRecaptcha(type);
                try {
                    const result = await signInWithPhoneNumber(auth, fullPhone, window[type === 'login' ? 'loginVerifier' : 'regVerifier']);
                    if (isLogin) loginConfirmation = result; else regConfirmation = result;
                    otpGroup.classList.add('show');
                    setLoading(btnId, spinnerId, textId, false, 'Verify Code →');
                    showAlert(alertId, 'OTP sent to ' + fullPhone, 'success');
                } catch (err) {
                    showAlert(alertId, err.message.replace('Firebase: ', ''), 'error');
                    setLoading(btnId, spinnerId, textId, false, 'Send Code →');
                }
            }
            // Step 2: Verify Code
            else {
                if (!otpCode) return showAlert(alertId, 'Enter 6-digit code', 'error');
                setLoading(btnId, spinnerId, textId, true, 'Verifying...');
                try {
                    const result = await confirmation.confirm(otpCode);
                    if (!isLogin) {
                        const name = document.getElementById('regPhoneName').value.trim() || 'Phone User';
                        await updateProfile(result.user, { displayName: name });
                    }
                    await UserStore.sync(result.user);
                    showToast('Success! Redirecting...', 'success', '🚀');
                } catch (err) {
                    showAlert(alertId, 'Invalid code. Try again.', 'error');
                    setLoading(btnId, spinnerId, textId, false, 'Verify Code →');
                }
            }
        }

        document.getElementById('phoneLoginForm').addEventListener('submit', (e) => handlePhoneAuth('login', e));
        document.getElementById('phoneRegisterForm').addEventListener('submit', (e) => handlePhoneAuth('reg', e));

        // ── Password strength ──
        document.getElementById('regPassword').addEventListener('input', (e) => {
            const pw = e.target.value;
            let score = 0;
            if (pw.length >= 6) score++;
            if (pw.length >= 10) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const fill = document.getElementById('pwFill');
            const colors = ['#ef4444', '#f59e0b', '#f59e0b', '#10b981', '#10b981'];
            fill.style.width = (score / 5 * 100) + '%';
            fill.style.background = colors[Math.max(0, score - 1)] || '#ef4444';
        });

        // Tab click listeners
        document.getElementById('tabLogin').addEventListener('click', () => switchTab('login'));
        document.getElementById('tabRegister').addEventListener('click', () => switchTab('register'));
    </script>
</body>

</html>
